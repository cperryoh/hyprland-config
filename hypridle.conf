general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = /usr/bin/openrgb --profile off; loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on; /usr/bin/openrgb --profile wallust-theme; python ~/scripts/open_rgb_script.py >> ~/logs.txt  # to avoid having to press a key twice to turn on the display.
}
listener {
    timeout = 1200
    on-timeout =  systemctl suspend                # suspend pc
}
listener {
    timeout = 600
    on-timeout =  hyprctl dispatch dpms off
    on-resume =  hyprctl dispatch dpms on
}
